name: Increment roll every minute

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch: {}

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Increment roll in data/repo.json
        run: |
          python - <<'PY'
          import json
          p = "data/repo.json"
          with open(p, 'r') as f:
              d = json.load(f)
          d['roll'] = int(d.get('roll', 0)) + 1
          with open(p, 'w') as f:
              json.dump(d, f, indent=2)
          print('New roll:', d['roll'])
          PY

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          if git status --porcelain | grep -q '^ M data/repo.json\|^?? data/repo.json'; then
            git add data/repo.json
            git commit -m "ci: increment roll"
            git push
          else
            echo "No changes to commit"
          fi
