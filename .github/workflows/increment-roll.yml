name: Increment roll every minute

permissions:
  contents: write

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  increment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Increment roll in data/repo.json
        run: |
          python - <<'PY'
          import json
          p = "data/repo.json"
          with open(p, 'r') as f:
              d = json.load(f)
          d['roll'] = int(d.get('roll', 0)) + 1
          with open(p, 'w') as f:
              json.dump(d, f, indent=2)
          print('New roll:', d['roll'])
          PY

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUSH_PAT: ${{ secrets.PUSH_PAT }}
          COMMIT_NAME: ${{ secrets.COMMIT_NAME }}
          COMMIT_EMAIL: ${{ secrets.COMMIT_EMAIL }}
        run: |
          if [ -n "$COMMIT_NAME" ]; then
            git config --global user.name "$COMMIT_NAME"
          else
            git config --global user.name "${{ github.actor }}"
          fi
          if [ -n "$COMMIT_EMAIL" ]; then
            git config --global user.email "$COMMIT_EMAIL"
          else
            git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          fi
          if git status --porcelain | grep -q '^ M data/repo.json\|^?? data/repo.json'; then
            git add data/repo.json
            git commit -m "ci: increment roll"
            BRANCH=${GITHUB_REF#refs/heads/}
            if [ -n "$PUSH_PAT" ]; then
              git remote set-url origin https://x-access-token:${PUSH_PAT}@github.com/${{ github.repository }}.git
            fi
            git push origin HEAD:$BRANCH
          else
            echo "No changes to commit"
          fi
